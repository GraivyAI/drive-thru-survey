name: Deploy Dev

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - '.github/workflows/deploy-dev.yml'

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            api:
              - 'apps/api/**'
              - 'tsconfig.base.json'
            ui:
              - 'apps/ui/**'
              - 'tsconfig.base.json'

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/survey-api:${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/survey-api:latest
          cache-from: type=gha,scope=survey-api
          cache-to: type=gha,mode=max,scope=survey-api

      - name: Set output
        id: meta
        run: echo "image=${{ vars.ACR_NAME }}.azurecr.io/survey-api:${{ github.sha }}" >> $GITHUB_OUTPUT

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ui/Dockerfile
          push: true
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/survey-ui:${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/survey-ui:latest
          cache-from: type=gha,scope=survey-ui
          cache-to: type=gha,mode=max,scope=survey-ui

      - name: Set output
        id: meta
        run: echo "image=${{ vars.ACR_NAME }}.azurecr.io/survey-ui:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [changes, build-api]
    if: needs.changes.outputs.api == 'true'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Container App
        run: |
          az containerapp update \
            --name survey-api-dev \
            --resource-group erie \
            --image ${{ needs.build-api.outputs.image }}

  deploy-ui:
    name: Deploy UI
    runs-on: ubuntu-latest
    needs: [changes, build-ui]
    if: needs.changes.outputs.ui == 'true'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy UI to Container App
        run: |
          az containerapp update \
            --name survey-ui-dev \
            --resource-group erie \
            --image ${{ needs.build-ui.outputs.image }}

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [changes, deploy-api, deploy-ui]
    if: |
      always() && 
      needs.deploy-api.result == 'success' && 
      needs.deploy-ui.result == 'success'
    steps:
      - name: Poll health endpoints
        run: |
          echo "Checking survey app health..."
          MAX_ATTEMPTS=12
          WAIT_SECONDS=10
          
          for i in $(seq 1 $MAX_ATTEMPTS); do
            API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.SURVEY_URL }}/api/health" || echo "000")
            UI_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.SURVEY_URL }}/" || echo "000")
            
            if [ "$API_STATUS" = "200" ] && [ "$UI_STATUS" = "200" ]; then
              echo "✅ Survey app health check passed"
              echo "API: $API_STATUS, UI: $UI_STATUS"
              echo "Available at: ${{ vars.SURVEY_URL }}"
              exit 0
            fi
            
            echo "Health check attempt $i/$MAX_ATTEMPTS: API $API_STATUS, UI $UI_STATUS"
            
            if [ $i -lt $MAX_ATTEMPTS ]; then
              echo "Waiting ${WAIT_SECONDS}s..."
              sleep $WAIT_SECONDS
            fi
          done
          
          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

  deploy-complete:
    name: Deploy Complete
    runs-on: ubuntu-latest
    needs: [changes, build-api, build-ui, deploy-api, deploy-ui, health-check]
    if: always()
    steps:
      - name: Check deployment result
        run: |
          API_CHANGES="${{ needs.changes.outputs.api }}"
          UI_CHANGES="${{ needs.changes.outputs.ui }}"
          API_RESULT="${{ needs.deploy-api.result }}"
          UI_RESULT="${{ needs.deploy-ui.result }}"
          HEALTH_RESULT="${{ needs.health-check.result }}"
          
          echo "=== Survey App Deployment Results ==="
          echo "API changes: $API_CHANGES, result: $API_RESULT"
          echo "UI changes: $UI_CHANGES, result: $UI_RESULT"
          echo "Health check: $HEALTH_RESULT"
          
          if [ "$API_RESULT" = "failure" ] || [ "$UI_RESULT" = "failure" ]; then
            echo "❌ Deployment failed"
            exit 1
          elif [ "$HEALTH_RESULT" = "success" ]; then
            echo "✅ Survey app deployed successfully"
            exit 0
          elif [ "$API_CHANGES" != "true" ] && [ "$UI_CHANGES" != "true" ]; then
            echo "⏭️ No changes - deployment skipped"
            exit 0
          else
            echo "⚠️ Deployment completed but health check failed"
            exit 1
          fi