name: Deploy Survey Dev

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'apps/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - '.github/workflows/deploy-dev.yml'

env:
  RESOURCE_GROUP: servthru-dev-erie-rg
  ACR_LOGIN_SERVER: graivyacr.azurecr.io

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            api:
              - 'apps/api/**'
              - 'tsconfig.base.json'
            ui:
              - 'apps/ui/**'
              - 'tsconfig.base.json'

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/survey-api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/survey-api:latest
          cache-from: type=gha,scope=survey-api
          cache-to: type=gha,mode=max,scope=survey-api

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ui/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/survey-ui:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/survey-ui:latest
          cache-from: type=gha,scope=survey-ui
          cache-to: type=gha,mode=max,scope=survey-ui

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [changes, build-api]
    if: needs.changes.outputs.api == 'true' && needs.build-api.result == 'success'
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Refresh ACR credentials on API container app
        run: |
          az containerapp registry set \
            --name survey-api-dev \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ${{ env.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Deploy API to Container App
        run: |
          az containerapp update \
            --name survey-api-dev \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/survey-api:${{ github.sha }}

  deploy-ui:
    name: Deploy UI
    runs-on: ubuntu-latest
    needs: [changes, build-ui]
    if: needs.changes.outputs.ui == 'true' && needs.build-ui.result == 'success'
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Refresh ACR credentials on UI container app
        run: |
          az containerapp registry set \
            --name survey-ui-dev \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ${{ env.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Deploy UI to Container App
        run: |
          az containerapp update \
            --name survey-ui-dev \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/survey-ui:${{ github.sha }}

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [changes, deploy-api, deploy-ui]
    if: |
      always() && 
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped') &&
      (needs.deploy-ui.result == 'success' || needs.deploy-ui.result == 'skipped') &&
      needs.deploy-api.result != 'failure' &&
      needs.deploy-ui.result != 'failure'
    steps:
      - name: Poll health endpoints
        run: |
          echo "Checking survey app health..."
          MAX_ATTEMPTS=12
          WAIT_SECONDS=10
          
          for i in $(seq 1 $MAX_ATTEMPTS); do
            API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://survey-api-dev.greenrock-05372d50.eastus2.azurecontainerapps.io/api/health" || echo "000")
            UI_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://survey-ui-dev.greenrock-05372d50.eastus2.azurecontainerapps.io/" || echo "000")
            
            if [ "$API_STATUS" = "200" ] && [ "$UI_STATUS" = "200" ]; then
              echo "✅ Survey app health check passed"
              echo "Available at: https://survey-ui-dev.greenrock-05372d50.eastus2.azurecontainerapps.io"
              exit 0
            fi
            
            echo "Health check attempt $i/$MAX_ATTEMPTS: API $API_STATUS, UI $UI_STATUS"
            
            if [ $i -lt $MAX_ATTEMPTS ]; then
              echo "Waiting ${WAIT_SECONDS}s..."
              sleep $WAIT_SECONDS
            fi
          done
          
          echo "❌ Health check failed"
          exit 1